<main class="max-w-3xl mx-auto px-8 py-12 space-y-8">

</div>
<div>
<h1 class="text-3xl font-['Manrope'] font-extrabold text-primary mb-1">Edit Club Details</h1>
<p class="text-on-surface-variant">Update the information for <span id="subtitleName" class="font-semibold text-on-surface">Loading...</span>.</p>
</div>
<form id="editForm" class="space-y-8">
<!-- Section: Basic Info -->
<section class="bg-surface-container-lowest rounded-xl border border-outline-variant/20 shadow-sm p-6 space-y-5">
<div class="flex items-center gap-3 border-b border-outline-variant/20 pb-4">
<div class="w-1.5 h-6 rounded-full bg-primary"></div>
<h2 class="font-['Manrope'] font-bold text-lg">Basic Information</h2>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-5">
<div class="space-y-1.5">
<label class="text-xs font-bold uppercase tracking-wider text-outline">Club Name</label>
<input id="inputName" class="w-full bg-surface-container-low rounded-lg px-4 py-3 text-sm border-none focus:ring-2 focus:ring-primary/20 transition-all" type="text" value=""/>
</div>
<div class="space-y-1.5">
<label class="text-xs font-bold uppercase tracking-wider text-outline">Category</label>
<div class="relative">
<select id="inputCategory" class="w-full bg-surface-container-low rounded-lg px-4 py-3 text-sm border-none focus:ring-2 focus:ring-primary/20 transition-all appearance-none">
<option value="Education &amp; Literature">Education &amp; Literature</option>
<option value="Athletics &amp; Sports">Athletics &amp; Sports</option>
<option value="Technology">Technology</option>
<option value="Arts &amp; Culture">Arts &amp; Culture</option>
<option value="Community Service">Community Service</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none">expand_more</span>
</div>
</div>
<div class="md:col-span-2 space-y-1.5">
<label class="text-xs font-bold uppercase tracking-wider text-outline">Tagline</label>
<input class="w-full bg-surface-container-low rounded-lg px-4 py-3 text-sm border-none focus:ring-2 focus:ring-primary/20 transition-all" type="text" value="Where Stories Come Alive"/>
</div>
<div class="md:col-span-2 space-y-1.5">
<label class="text-xs font-bold uppercase tracking-wider text-outline">Description</label>
<textarea id="inputDesc" class="w-full bg-surface-container-low rounded-lg px-4 py-3 text-sm border-none focus:ring-2 focus:ring-primary/20 transition-all h-28 resize-none"></textarea>
</div>
</div>
</section>
<!-- Section: Leadership -->
<section class="bg-surface-container-lowest rounded-xl border border-outline-variant/20 shadow-sm p-6 space-y-5">
<div class="flex items-center gap-3 border-b border-outline-variant/20 pb-4">
<div class="w-1.5 h-6 rounded-full bg-primary"></div>
<h2 class="font-['Manrope'] font-bold text-lg">Leadership</h2>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-5">
<div class="space-y-1.5">
<label class="text-xs font-bold uppercase tracking-wider text-outline">Pres. Email</label>
<input id="inputPresident" class="w-full bg-surface-container-low rounded-lg px-4 py-3 text-sm border-none focus:ring-2 focus:ring-primary/20 transition-all" type="text" value=""/>
</div>
<div class="space-y-1.5">
<label class="text-xs font-bold uppercase tracking-wider text-outline">Secretary</label>
<input class="w-full bg-surface-container-low rounded-lg px-4 py-3 text-sm border-none focus:ring-2 focus:ring-primary/20 transition-all" type="text" value="Marcus Wells"/>
</div>
<div class="space-y-1.5">
<label class="text-xs font-bold uppercase tracking-wider text-outline">Treasurer</label>
<input class="w-full bg-surface-container-low rounded-lg px-4 py-3 text-sm border-none focus:ring-2 focus:ring-primary/20 transition-all" type="text" value="Priya Sharma"/>
</div>
<div class="space-y-1.5">
<label class="text-xs font-bold uppercase tracking-wider text-outline">Faculty Advisor</label>
<input class="w-full bg-surface-container-low rounded-lg px-4 py-3 text-sm border-none focus:ring-2 focus:ring-primary/20 transition-all" type="text" value="Dr. Emma Brown"/>
</div>
</div>
</section>
<!-- Actions -->
<div class="flex gap-4 pt-4">
<button onclick="updateClub(event)" class="flex-1 py-3 bg-primary text-on-primary rounded-xl font-bold hover:opacity-90 transition-all shadow-md" type="button">Save Changes</button>
<a class="flex-1 py-3 bg-surface-container text-on-surface rounded-xl font-bold hover:bg-surface-container-high transition-all text-center" href="admin-clubs.html">Cancel</a>

<footer class="py-8 border-t border-outline-variant/15 mt-12">
<div class="text-center text-xs text-outline">© 2024 Scholar Hub Admin. University Event Management System.</div>
</footer>
<script>
    let currentClubId = null;
    let oldClubData = null;

    document.addEventListener('DOMContentLoaded', async () => {
        const urlParams = new URLSearchParams(window.location.search);
        currentClubId = urlParams.get('id');
        
        if (!currentClubId) {
            alert('No club ID provided.');
            window.location.href = 'admin-clubs.html';
            return;
        }

        try {
            const res = await fetch(`/api/clubs/${currentClubId}`);
            if (!res.ok) throw new Error('Failed to load club');
            const club = await res.json();
            oldClubData = club;
            
            document.getElementById('subtitleName').textContent = club.name || 'Untitled Club';
            document.getElementById('inputName').value = club.name || '';
            document.getElementById('inputDesc').value = club.description || '';
            document.getElementById('inputPresident').value = club.presidentEmail || '';
            
            const catSelect = document.getElementById('inputCategory');
            let found = false;
            if(club.category) {
                Array.from(catSelect.options).forEach(opt => {
                    if(opt.value === club.category) {
                        opt.selected = true;
                        found = true;
                    }
                });
                if(!found) {
                    const newOpt = new Option(club.category, club.category, true, true);
                    catSelect.add(newOpt);
                }
            }

        } catch (err) {
            console.error(err);
            alert('Error loading club data.');
        }
    });

    async function updateClub(e) {
        e.preventDefault();
        if (!currentClubId) return;

        const updatedClub = {
            ...oldClubData,
            name: document.getElementById('inputName').value,
            description: document.getElementById('inputDesc').value,
            presidentEmail: document.getElementById('inputPresident').value,
            category: document.getElementById('inputCategory').value
        };

        try {
            const res = await fetch(`/api/clubs/${currentClubId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(updatedClub)
            });
            if(res.ok) {
                alert('Club details updated successfully.');
                window.location.href = `admin-registeredclubprofile.html?id=${currentClubId}`;
            } else {
                alert('Error updating club details.');
            }
        } catch (err) {
            console.error(err);
            alert('Network error.');
        }
    }
</script>
