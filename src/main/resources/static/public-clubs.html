<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Uni Event Portal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#21417f",
                        "on-surface": "#191c1d",
                        "on-surface-variant": "#444650",
                        "surface-container-high": "#e7e8e9",
                        "surface-container-highest": "#e1e3e4",
                        "surface-container-low": "#f3f4f5",
                        "surface-container-lowest": "#ffffff"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .primary-gradient { background: linear-gradient(135deg, #21417f 0%, #3b5998 100%); }

        /* ── Auth Buttons ── */
        .btn-signin {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 20px;
            font-size: 13px;
            font-weight: 700;
            color: #21417f;
            background: transparent;
            border: 1.5px solid #21417f;
            border-radius: 10px;
            text-decoration: none;
            letter-spacing: 0.02em;
            transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease;
        }
        .btn-signin:hover {
            background: #21417f;
            color: #ffffff;
            box-shadow: 0 4px 14px rgba(33, 65, 127, 0.25);
            transform: translateY(-1px);
        }
        .btn-signin:active { transform: translateY(0); }

        .btn-signup {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 9px 22px;
            font-size: 13px;
            font-weight: 800;
            color: #ffffff;
            background: linear-gradient(135deg, #21417f 0%, #4B69FF 100%);
            border: none;
            border-radius: 10px;
            text-decoration: none;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            box-shadow: 0 4px 14px rgba(75, 105, 255, 0.30);
            transition: box-shadow 0.25s ease, transform 0.15s ease, filter 0.2s ease;
        }
        .btn-signup:hover {
            box-shadow: 0 6px 22px rgba(75, 105, 255, 0.50);
            filter: brightness(1.08);
            transform: translateY(-2px);
        }
        .btn-signup:active { transform: translateY(0); box-shadow: 0 2px 8px rgba(75,105,255,0.30); }
        .btn-signup .arrow-icon {
            font-size: 16px;
            transition: transform 0.2s ease;
        }
        .btn-signup:hover .arrow-icon { transform: translateX(3px) translateY(-1px); }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .auth-btn-group {
            animation: fadeSlideIn 0.5s ease 0.1s both;
        }
    </style>
</head>
<body class="bg-[#f8f9fa] font-body text-on-surface antialiased">
<div id="layout-root">
<header class="bg-white border-b border-slate-200 sticky-nav h-16 flex items-center">
    <div class="max-w-7xl mx-auto px-6 w-full flex justify-between items-center h-full">
        <div class="flex items-center gap-12 h-full">
            <a href="landing-page.html" class="flex items-center gap-2">
                <img src="assets/images/logo.png" alt="Scholar Hub" class="h-8 md:h-10">
            </a>
            <nav class="hidden md:flex items-center space-x-8 text-sm font-semibold h-full">
                <a class="nav-link text-slate-500 hover:text-primary transition-colors font-medium h-full flex items-center" href="landing-page.html">Home</a>
                <a class="nav-link text-slate-500 hover:text-primary transition-colors font-medium h-full flex items-center" href="public-events.html">Events</a>
                <a class="nav-link text-slate-500 hover:text-primary transition-colors font-medium h-full flex items-center" href="public-clubs.html">Clubs</a>
                <a class="nav-link text-slate-500 hover:text-primary transition-colors font-medium h-full flex items-center" href="about-us.html">About Us</a>
            </nav>
        </div>
        <div class="flex items-center gap-4 h-full">
            <div class="flex items-center gap-3 pl-4 border-l border-slate-200 auth-btn-group">
                <a href="login.html" class="btn-signin">
                    <span class="material-symbols-outlined" style="font-size:16px;">login</span>
                    Sign In
                </a>
                <a href="signup.html" class="btn-signup">
                    Sign Up
                    <span class="material-symbols-outlined arrow-icon">north_east</span>
                </a>
            </div>
        </div>
    </div>
</header>

<main class="page-transition-enter">
    <div class="max-w-7xl mx-auto px-6 py-12 w-full">
    <header class="flex flex-col space-y-8 mb-16 text-center sm:text-left">
        <div class="space-y-2">
            <h1 class="font-headline text-4xl font-extrabold text-on-surface tracking-tight">Active Student Clubs</h1>
            <p class="text-slate-500 font-body text-lg">Discover and connect with more than 40+ active student organizations at SLIIT.</p>
        </div>
        <div class="flex flex-col lg:flex-row items-center gap-6 w-full">
            <div class="w-full lg:max-w-md relative group">
                <span class="material-symbols-outlined absolute left-4 inset-y-0 flex items-center text-slate-400">search</span>
                <input id="clubSearch" class="w-full pl-12 pr-4 py-3.5 bg-white rounded-xl border border-slate-100 focus:ring-2 focus:ring-primary/20 shadow-sm text-on-surface" placeholder="Search by name, interest or mission..." type="text"/>
            </div>
            <div id="categoryTabs" class="flex items-center gap-3 overflow-x-auto no-scrollbar w-full lg:w-auto py-2">
                <button class="tab-btn px-6 py-2 rounded-full bg-primary text-white font-medium text-sm transition-all shadow-md" data-category="">All</button>
                <button class="tab-btn px-6 py-2 rounded-full bg-white border border-slate-100 text-on-surface-variant font-medium text-sm hover:bg-slate-50 transition-all" data-category="Academic">Academic</button>
                <button class="tab-btn px-6 py-2 rounded-full bg-white border border-slate-100 text-on-surface-variant font-medium text-sm hover:bg-slate-50 transition-all" data-category="Tech">Technology</button>
                <button class="tab-btn px-6 py-2 rounded-full bg-white border border-slate-100 text-on-surface-variant font-medium text-sm hover:bg-slate-50 transition-all" data-category="Arts">Arts</button>
                <button class="tab-btn px-6 py-2 rounded-full bg-white border border-slate-100 text-on-surface-variant font-medium text-sm hover:bg-slate-50 transition-all" data-category="Social">Social</button>
            </div>
        </div>
    </header>

    <section id="clubGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <!-- Data populated via JS -->
         <p class="col-span-full text-center text-slate-500 py-12">Loading clubs...</p>
    </section>
</main>

<script>
    let allClubs = [];
    let activeCategory = "";

    document.addEventListener('DOMContentLoaded', () => {
        fetchClubs();
        document.getElementById('clubSearch').addEventListener('input', filterClubs);
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => {
                    b.classList.remove('bg-primary', 'text-white', 'shadow-md');
                    b.classList.add('bg-white', 'border', 'border-slate-100', 'text-on-surface-variant');
                });
                btn.classList.add('bg-primary', 'text-white', 'shadow-md');
                btn.classList.remove('bg-white', 'border', 'border-slate-100', 'text-on-surface-variant');
                activeCategory = btn.getAttribute('data-category');
                filterClubs();
            });
        });
    });

    async function fetchClubs() {
        try {
            const resp = await fetch(`/api/clubs/admin/approved?t=${Date.now()}`);
            allClubs = await resp.json();
            filterClubs();
        } catch (e) {
            console.error("Failed to load clubs", e);
            document.getElementById('clubGrid').innerHTML = '<p class="col-span-full text-center text-red-500 py-12">Unable to load clubs at this time.</p>';
        }
    }

    function renderClubs(clubs) {
        const grid = document.getElementById('clubGrid');
        grid.innerHTML = '';
        
        if (clubs.length === 0) {
            grid.innerHTML = '<p class="col-span-full text-center text-slate-500 py-12">No clubs found matching your criteria.</p>';
            return;
        }

        clubs.forEach(club => {
            const card = `
                <div class="bg-white p-8 rounded-xl shadow-sm border border-slate-100 flex flex-col justify-between group hover:-translate-y-1 transition-transform duration-300">
                    <div class="space-y-6">
                        <div class="flex justify-between items-start">
                            <div class="w-16 h-16 rounded-xl bg-slate-50 border border-slate-100 flex items-center justify-center overflow-hidden">
                                <img src="${club.logoUrl || 'https://images.unsplash.com/photo-1540575861501-7ad05823c94b?auto=format&fit=crop&q=80&w=2070'}" alt="${club.name}" class="w-full h-full object-cover">
                            </div>
                            <span class="px-3 py-1 rounded-full bg-slate-100 text-slate-600 text-[0.6875rem] font-bold uppercase tracking-wider border border-slate-200">${club.category || 'Organized Club'}</span>
                        </div>
                        <div>
                            <h3 class="font-headline text-xl font-bold text-on-surface mb-2">${club.name}</h3>
                            <p class="text-slate-500 text-sm line-clamp-2 leading-relaxed">${club.description || 'Community of enthusiasts dedicated to excellence and growth.'}</p>
                        </div>
                        <div class="flex items-center gap-2 text-slate-400 text-sm font-medium">
                            <span class="material-symbols-outlined text-sm">groups</span>
                            <span>Open for Membership</span>
                        </div>
                    </div>
                    <div class="mt-8">
                        <button onclick="window.location.href='student-viewclubdetails.html?id=${club.id}'" class="w-full py-3 px-4 rounded-lg primary-gradient text-white font-bold text-sm shadow-sm hover:opacity-95 transition-all active:scale-95 flex items-center justify-center gap-2">
                           View Profile <span class="material-symbols-outlined text-sm">arrow_forward</span>
                        </button>
                    </div>
                </div>
            `;
            grid.innerHTML += card;
        });
    }

    function filterClubs() {
        const search = document.getElementById('clubSearch').value.toLowerCase();
        const filtered = allClubs.filter(club => {
            const matchesSearch = club.name.toLowerCase().includes(search) || (club.description && club.description.toLowerCase().includes(search));
            const matchesCategory = activeCategory === "" || (club.category && club.category === activeCategory);
            return matchesSearch && matchesCategory;
        });
        renderClubs(filtered);
    }
</script>
    </div>
</main>
</div>
<script src="assets/js/transitions.js"></script>
</body>
</html>
