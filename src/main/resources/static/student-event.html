<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Uni Event Portal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="assets/css/transitions.css">
    <script src="assets/js/data-sync.js"></script>
    <script src="assets/js/transitions.js" defer></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#21417f",
                        "on-primary": "#ffffff",
                        "on-surface": "#191c1d",
                        "surface-container": "#edeeef",
                        "surface-container-low": "#f3f4f5",
                        "surface-container-highest": "#e1e3e4",
                        "surface-container-lowest": "#ffffff"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .hero-gradient { background: linear-gradient(135deg, #21417f 0%, #3b5998 100%); }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased">
<div id="layout-root">
<header class="bg-white border-b border-slate-200 sticky-nav h-16 flex items-center shadow-sm">
    <div class="max-w-7xl mx-auto px-6 w-full flex justify-between items-center h-full">
        <div class="flex items-center gap-12 h-full">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='student-dashboard.html'">
                <img src="assets/images/logo.png" alt="Scholar Hub" class="h-8 md:h-10">
            </div>
            <nav class="hidden md:flex items-center h-full space-x-8">
                <a class="nav-link text-sm font-medium text-slate-500 hover:text-primary h-full flex items-center" href="student-dashboard.html">Dashboard</a>
                <a class="nav-link text-sm font-medium text-slate-500 hover:text-primary h-full flex items-center" href="student-event.html">Events</a>
                <a class="nav-link text-sm font-medium text-slate-500 hover:text-primary h-full flex items-center" href="student-clubs.html">Clubs</a>
                <a class="nav-link text-sm font-medium text-slate-500 hover:text-primary h-full flex items-center" href="student-venues.html">Venues</a>
                <a class="nav-link text-sm font-medium text-slate-500 hover:text-primary h-full flex items-center" href="student-feedback.html">Feedback</a>
            </nav>
        </div>
        <div class="flex items-center gap-4">
            <button class="relative p-1 text-slate-500 hover:text-primary">
                <span class="material-symbols-outlined align-middle">notifications</span>
            </button>
            <div class="flex items-center gap-3 pl-3 border-l border-slate-200 relative cursor-pointer group" onclick="document.getElementById('profileDropdown').classList.toggle('hidden')">
                <div class="h-9 w-9 rounded-full overflow-hidden border border-slate-200 bg-slate-100 flex items-center justify-center">
                    <span class="material-symbols-outlined text-slate-500">person</span>
                </div>
                <span id="userName" class="text-sm font-semibold text-slate-700 hidden lg:block">User</span>
                <span class="material-symbols-outlined text-sm text-slate-400">expand_more</span>
                
                <div id="profileDropdown" class="hidden absolute top-full right-0 mt-4 w-48 bg-white rounded-xl shadow-lg border border-slate-200 py-2 z-50">
                    <a href="profile.html" class="flex items-center gap-2 px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 transition-colors">
                        <span class="material-symbols-outlined text-[18px]">person</span>
                        My Profile
                    </a>
                    <div class="h-[1px] bg-slate-100 my-1 mx-2"></div>
                    <a href="#" onclick="logout()" class="flex items-center gap-2 px-4 py-2 text-sm text-error hover:bg-error/5 transition-colors font-semibold">
                        <span class="material-symbols-outlined text-[18px]">logout</span>
                        Logout
                    </a>
                </div>
            </div>
        </div>
    </div>
</header>

<main class="page-transition-enter">
    <div class="max-w-7xl mx-auto px-6 py-12 w-full">
    <section class="mb-12 space-y-8">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
                <h1 class="font-headline font-extrabold text-4xl text-on-surface tracking-tight mb-2">Discover Campus Life</h1>
                <p class="text-slate-500 text-lg">Connect, learn, and grow through scholar-led experiences.</p>
            </div>
            <div class="flex gap-3">
                <button onclick="window.location.href='my-activities.html?tab=events'" class="hero-gradient text-white px-6 py-3.5 rounded-2xl text-sm font-bold flex items-center gap-2 shadow-xl shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all">
                    <span class="material-symbols-outlined text-lg font-bold">how_to_reg</span>
                    My Registered Events
                </button>
                <button id="newEventBtn" onclick="window.location.href='clubadmin-newevent.html'" class="hidden bg-white text-primary border border-primary/20 px-6 py-3.5 rounded-2xl text-sm font-bold flex items-center gap-2 shadow-sm hover:scale-[1.02] active:scale-95 transition-all magnetic-btn">
                    <span class="material-symbols-outlined text-lg font-bold">add</span>
                    New Event
                </button>
            </div>
        </div>
        
        <div class="flex flex-col md:flex-row items-end gap-4 mb-8">
            <div class="relative group flex-1 w-full">
                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">search</span>
                <input id="searchInput" class="w-full pl-12 pr-4 py-3.5 bg-white border-none rounded-xl shadow-sm focus:ring-2 focus:ring-primary/20 text-base" placeholder="Search events..." type="text"/>
            </div>
            <div class="flex flex-col gap-2 w-full md:w-48">
                <label class="text-xs uppercase tracking-widest text-slate-500 font-bold ml-1">Categories</label>
                <select id="categoryFilter" class="w-full bg-slate-100 border-none rounded-lg px-4 py-3.5 text-sm font-medium focus:ring-2 focus:ring-primary/20 transition-all">
                    <option value="">All Categories</option>
                    <option value="Academic">Academic</option>
                    <option value="Tech">Technology</option>
                    <option value="Sports">Sports</option>
                    <option value="Culture">Art & Culture</option>
                    <option value="Social">Social</option>
                </select>
            </div>
            <div class="flex flex-col gap-2 w-full md:w-48">
                <label class="text-xs uppercase tracking-widest text-slate-500 font-bold ml-1">Access Type</label>
                <select id="accessFilter" class="w-full bg-slate-100 border-none rounded-lg px-4 py-3.5 text-sm font-medium focus:ring-2 focus:ring-primary/20 transition-all">
                    <option value="">All Access</option>
                    <option value="required">Registration Required</option>
                    <option value="public">Public (Open)</option>
                </select>
            </div>
            <div class="flex flex-col gap-2 w-full md:w-48">
                <label class="text-xs uppercase tracking-widest text-slate-500 font-bold ml-1">Time</label>
                <select id="typeFilter" class="w-full bg-slate-100 border-none rounded-lg px-4 py-3.5 text-sm font-medium focus:ring-2 focus:ring-primary/20 transition-all">
                    <option value="all" selected>All Events</option>
                    <option value="upcoming">Upcoming Events</option>
                    <option value="past">Past Events</option>
                </select>
            </div>
        </div>
    </section>

    <!-- My Registered Events Section -->
    <section id="myRegisteredSection" class="hidden mb-12">
        <div class="flex items-center gap-3 mb-6">
            <span class="material-symbols-outlined text-primary text-2xl">how_to_reg</span>
            <h2 class="font-headline font-bold text-2xl text-on-surface">My Registered Events</h2>
            <span id="regCount" class="bg-primary text-white text-xs font-bold px-2.5 py-1 rounded-full">0</span>
        </div>
        <div id="myRegisteredGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 mb-8"></div>
        <div class="h-px bg-slate-200 mb-8"></div>
    </section>

    <section id="eventGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
        <!-- Data populated via JS -->
    </section>
    </div>
</main>
</div>

<script>
    let allEvents = [];
    let user = null;
    let isAdmin = false;
    let pollingInterval = null;
    let registeredEventIds = new Set();

    document.addEventListener('DOMContentLoaded', () => {
        user = JSON.parse(localStorage.getItem('user'));
        isAdmin = user && (user.role === 'ADMIN' || user.role === 'CLUB_ADMIN');
        if (user) {
            document.getElementById('userName').textContent = user.name;
            if (isAdmin) {
                const btn = document.getElementById('newEventBtn');
                btn.classList.remove('hidden');
                if (user.role === 'ADMIN') {
                    btn.setAttribute('onclick', "window.location.href='admin-newevent.html'");
                }
            }
            fetchMyRegistrations();
        }
        
        fetchEvents();
        pollingInterval = setInterval(fetchEvents, 10000);
        
        restoreFilters();

        document.getElementById('searchInput').addEventListener('input', () => { saveFilters(); filterEvents(); });
        document.getElementById('categoryFilter').addEventListener('change', () => { saveFilters(); filterEvents(); });
        document.getElementById('accessFilter').addEventListener('change', () => { saveFilters(); filterEvents(); });
        document.getElementById('typeFilter').addEventListener('change', () => { saveFilters(); fetchEvents(); });

        document.addEventListener('click', (e) => {
            const dropdown = document.getElementById('profileDropdown');
            const profileBtn = dropdown.parentElement;
            if (dropdown && !profileBtn.contains(e.target)) {
                dropdown.classList.add('hidden');
            }
        });
    });

    function logout() {
        sessionStorage.clear();
        localStorage.removeItem('user');
        window.location.href = 'login.html';
    }

    async function fetchMyRegistrations() {
        if (!user) return;
        try {
            const resp = await fetch(`/api/registrations/student/${user.id}?t=${Date.now()}`);
            const registrations = await resp.json();
            registeredEventIds = new Set(registrations.map(r => r.event ? r.event.id : null).filter(Boolean));
            renderMyRegisteredEvents(registrations);
        } catch (e) {
            console.error('Failed to load registrations', e);
        }
    }

    function renderMyRegisteredEvents(registrations) {
        const section = document.getElementById('myRegisteredSection');
        const grid = document.getElementById('myRegisteredGrid');
        const count = document.getElementById('regCount');

        const validRegs = registrations.filter(r => r.event);
        if (validRegs.length === 0) {
            section.classList.add('hidden');
            return;
        }

        section.classList.remove('hidden');
        count.textContent = validRegs.length;
        grid.innerHTML = '';

        validRegs.forEach(reg => {
            const ev = reg.event;
            const date = new Date(ev.startTime).toLocaleDateString();
            const statusColor = reg.status === 'CONFIRMED' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700';
            const card = `
                <div class="bg-white rounded-xl overflow-hidden shadow-sm border-l-4 border-primary flex">
                    <div class="w-24 h-full flex-shrink-0 overflow-hidden">
                        <img alt="${ev.title}" class="w-full h-full object-cover" src="${ev.posterUrl || 'https://images.unsplash.com/photo-1540575861501-7ad05823c94b?auto=format&fit=crop&q=80&w=2070'}"/>
                    </div>
                    <div class="p-4 flex-1 flex flex-col justify-center">
                        <div class="flex items-center gap-2 mb-1">
                            <h4 class="font-headline font-bold text-sm text-on-surface line-clamp-1">${ev.title}</h4>
                            <span class="${statusColor} px-2 py-0.5 rounded-full text-[9px] font-bold uppercase">${reg.status}</span>
                        </div>
                        <div class="flex items-center gap-3 text-xs text-slate-500">
                            <span class="flex items-center gap-1"><span class="material-symbols-outlined text-xs">calendar_month</span>${date}</span>
                            <span class="flex items-center gap-1"><span class="material-symbols-outlined text-xs">location_on</span>${ev.venue ? ev.venue.name : ev.location || 'Campus'}</span>
                        </div>
                    </div>
                    <div class="flex items-center pr-4">
                        <button onclick="window.location.href='${ev.registrationRequired ? 'student-registerrequiredeventsdetails.html' : 'student-publiceventsdetails.html'}?id=${ev.id}'" class="text-primary text-xs font-bold hover:underline">View</button>
                    </div>
                </div>
            `;
            grid.innerHTML += card;
        });
    }

    function saveFilters() {
        const filters = {
            search: document.getElementById('searchInput').value,
            category: document.getElementById('categoryFilter').value,
            access: document.getElementById('accessFilter').value,
            type: document.getElementById('typeFilter').value
        };
        sessionStorage.setItem('eventFilters', JSON.stringify(filters));
    }

    function restoreFilters() {
        const saved = sessionStorage.getItem('eventFilters');
        if (saved) {
            const filters = JSON.parse(saved);
            document.getElementById('searchInput').value = filters.search || '';
            document.getElementById('categoryFilter').value = filters.category || '';
            document.getElementById('accessFilter').value = filters.access || '';
            document.getElementById('typeFilter').value = filters.type || 'all';
        }
    }

    async function fetchEvents() {
        const type = document.getElementById('typeFilter').value;
        let endpoint = '/api/events/admin/upcoming'; // Default to upcoming approved
        if (type === 'past') endpoint = '/api/events/admin/past';
        else if (type === 'all') endpoint = '/api/events/admin/approved';
        
        try {
            const resp = await fetch(endpoint + "?t=" + Date.now());
            allEvents = await resp.json();
            filterEvents();
        } catch (e) {
            console.error("Failed to load events", e);
        }
    }

    function renderEvents(events) {
        const grid = document.getElementById('eventGrid');
        grid.innerHTML = '';
        
        if (events.length === 0) {
            grid.innerHTML = '<p class="col-span-full text-center text-slate-500">No events found.</p>';
            return;
        }

        events.forEach(ev => {
            const date = new Date(ev.startTime).toLocaleDateString();
            const time = `${new Date(ev.startTime).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})} - ${new Date(ev.endTime).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
            const isRegistered = registeredEventIds.has(ev.id);
            
            const card = `
                <div class="group bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-all flex flex-col ${isRegistered ? 'ring-2 ring-primary/30' : ''}">
                    <div class="relative h-56 overflow-hidden">
                        <img alt="${ev.title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" src="${ev.posterUrl || 'https://images.unsplash.com/photo-1540575861501-7ad05823c94b?auto=format&fit=crop&q=80&w=2070'}"/>
                        <div class="absolute top-4 left-4 flex gap-2">
                            <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider">${ev.eventType || 'Tech'}</span>
                            <span class="${ev.registrationRequired ? 'bg-amber-100 text-amber-700' : 'bg-emerald-100 text-emerald-700'} px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider">${ev.registrationRequired ? 'RSVP' : 'Public'}</span>
                        </div>
                        ${isRegistered ? '<div class="absolute top-4 right-4 bg-primary text-white px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider flex items-center gap-1"><span class="material-symbols-outlined text-xs">check_circle</span>Registered</div>' : ''}
                    </div>
                    <div class="p-6 flex-1 flex flex-col">
                        <h3 class="font-headline font-bold text-xl text-on-surface mb-3 line-clamp-1">${ev.title}</h3>
                        <div class="space-y-2 mb-6 text-slate-500">
                            <div class="flex items-center gap-2">
                                <span class="material-symbols-outlined text-lg">calendar_month</span>
                                <span class="text-sm">${date}</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="material-symbols-outlined text-lg">schedule</span>
                                <span class="text-sm">${time}</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="material-symbols-outlined text-lg">location_on</span>
                                <span class="text-sm">${ev.venue ? ev.venue.name : ev.location || 'Campus'}</span>
                            </div>
                        </div>
                        <div class="flex gap-3 mt-auto">
                            <button onclick="window.location.href='${ev.registrationRequired ? 'student-registerrequiredeventsdetails.html' : 'student-publiceventsdetails.html'}?id=${ev.id}'" class="flex-1 hero-gradient text-white py-2.5 rounded-lg text-sm font-bold active:scale-95 transition-all">Details</button>
                            ${ev.registrationRequired && user && user.role !== 'ADMIN' && !isRegistered ? `<button class="px-4 py-2.5 border border-slate-200 text-primary rounded-lg text-sm font-bold hover:bg-slate-100">Register</button>` : ''}
                            ${isRegistered ? `<span class="px-4 py-2.5 bg-emerald-50 text-emerald-700 rounded-lg text-sm font-bold flex items-center gap-1"><span class="material-symbols-outlined text-sm">check</span>Joined</span>` : ''}
                        </div>
                    </div>
                </div>
            `;
            grid.innerHTML += card;
        });
    }

    function filterEvents() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const category = document.getElementById('categoryFilter').value;
        const access = document.getElementById('accessFilter').value;
        
        const filtered = allEvents.filter(ev => {
            const matchesSearch = ev.title.toLowerCase().includes(search) || ev.description.toLowerCase().includes(search);
            const matchesCategory = category === "" || ev.eventType === category;
            
            let matchesAccess = true;
            if (access === 'required') matchesAccess = ev.registrationRequired === true;
            if (access === 'public') matchesAccess = ev.registrationRequired === false || !ev.registrationRequired;
            
            return matchesSearch && matchesCategory && matchesAccess;
        });
        
        renderEvents(filtered);
    }
</script>
</body>
</html>
