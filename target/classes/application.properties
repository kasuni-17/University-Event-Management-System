spring.application.name=UniEvent
server.port=8083

# ============================================================
# Database Configuration
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/unievent_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&autoReconnect=true
spring.datasource.username=root
spring.datasource.password=kasuni123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool settings
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.auto-commit=false

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true

# Continue on error for development
spring.jpa.open-in-view=false

# ============================================================
# Swagger UI
# ============================================================
springdoc.swagger-ui.path=/swagger-ui.html
debug=true
server.error.include-message=always
server.error.include-binding-errors=always

# ============================================================
# Application Info  (used by EmailService for links & branding)
# ============================================================
app.name=UniEvent
app.url=http://localhost:8080

# ============================================================
# Email Configuration — Gmail SMTP
#
# ⚠️  IMPORTANT — Gmail requires an APP PASSWORD, not your login password.
#
# HOW TO GET YOUR APP PASSWORD (one-time setup):
#   1. Go to → https://myaccount.google.com/security
#   2. Make sure "2-Step Verification" is ENABLED
#   3. In the search bar type → "App passwords"
#   4. Click "App passwords" → choose App: "Mail", Device: "Other"
#   5. Type a name (e.g. "UniEvent") → click GENERATE
#   6. Copy the 16-character code (e.g. abcd efgh ijkl mnop)
#   7. Paste it below WITHOUT spaces (e.g. abcdefghijklmnop)
#
# The FROM address used for all notification emails is the username below.
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=superadmin1018@gmail.com
# ↓ REPLACE THIS with your 16-character Google App Password (NOT your Gmail login password)
spring.mail.password=tehjviqmhuntizyl

# SMTP Auth & TLS
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# Timeouts (ms) — prevents hanging threads
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Connection pooling
spring.mail.properties.mail.smtp.pool=true
spring.mail.properties.mail.smtps.quitwait=false

# Encoding
spring.mail.default-encoding=UTF-8
