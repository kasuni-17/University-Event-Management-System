<main class="page-transition-enter p-6 md:p-12 flex items-center justify-center">

<form id="newUserForm" class="space-y-10">
<!-- Personal Information -->
<section class="bg-surface-container-low/30 rounded-xl p-6 md:p-8 border border-outline-variant/10">
<div class="flex items-center gap-3 mb-8">
<div class="w-1.5 h-6 bg-primary rounded-full"></div>
<h2 class="text-xl font-bold text-on-surface">Personal Information</h2>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
<div class="flex flex-col gap-2">
<label class="text-xs font-bold uppercase tracking-wider text-outline px-1">Full Name</label>
<input id="fullName" required class="bg-white border border-outline-variant rounded-lg p-3 focus:ring-2 focus:ring-primary/20 transition-all text-on-surface placeholder:text-outline/40 text-sm outline-none" placeholder="e.g. Julian Montgomery" type="text"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-xs font-bold uppercase tracking-wider text-outline px-1">Email Address</label>
<input id="email" required class="bg-white border border-outline-variant rounded-lg p-3 focus:ring-2 focus:ring-primary/20 transition-all text-on-surface placeholder:text-outline/40 text-sm outline-none" placeholder="j.montgomery@university.edu" type="email"/>
</div>
<div class="flex flex-col gap-2 md:col-span-2">
<label class="text-xs font-bold uppercase tracking-wider text-outline px-1">Password</label>
<input id="password" required class="bg-white border border-outline-variant rounded-lg p-3 focus:ring-2 focus:ring-primary/20 transition-all text-on-surface placeholder:text-outline/40 text-sm outline-none" placeholder="••••••••" type="password"/>
</div>
</div>
</section>
<!-- Academic Details -->
<section class="bg-surface-container-low/30 rounded-xl p-6 md:p-8 border border-outline-variant/10">
<div class="flex items-center gap-3 mb-8">
<div class="w-1.5 h-6 bg-primary rounded-full"></div>
<h2 class="text-xl font-bold text-on-surface">Academic/Professional Details</h2>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
<div class="flex flex-col gap-2">
<label class="text-xs font-bold uppercase tracking-wider text-outline px-1">Student/Staff ID</label>
<input id="universityId" required class="bg-white border border-outline-variant rounded-lg p-3 focus:ring-2 focus:ring-primary/20 transition-all text-on-surface placeholder:text-outline/40 text-sm outline-none" placeholder="ID-2024-XXXX" type="text"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-xs font-bold uppercase tracking-wider text-outline px-1">Confirm Password</label>
<input id="confirmPassword" required class="w-full bg-white border border-outline-variant rounded-lg p-3 focus:ring-2 focus:ring-primary/20 transition-all text-on-surface text-sm outline-none" placeholder="••••••••" type="password"/>
</div>
</div>
</section>
<!-- Account Role -->
<section class="bg-surface-container-low/30 rounded-xl p-6 md:p-8 border border-outline-variant/10">
<div class="flex items-center gap-3 mb-6">
<div class="w-1.5 h-6 bg-primary rounded-full"></div>
<h2 class="text-xl font-bold text-on-surface">Account Role</h2>
</div>
<p class="text-sm text-on-surface-variant mb-6">Assigning a role determines the user's access level across the Scholar Hub ecosystem.</p>
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
<label class="group relative flex flex-col p-5 bg-white rounded-xl cursor-pointer border-2 border-transparent shadow-sm transition-all hover:bg-surface-container-low has-[:checked]:border-primary has-[:checked]:bg-primary/[0.03]">
<input checked class="sr-only" name="role" type="radio" value="STUDENT"/>
<span class="material-symbols-outlined text-primary mb-3 text-2xl">school</span>
<span class="font-bold text-on-surface text-sm mb-1">Student</span>
<span class="text-xs text-on-surface-variant leading-relaxed">Standard portal access and record viewing.</span>
</label>
<label class="group relative flex flex-col p-5 bg-white rounded-xl cursor-pointer border-2 border-transparent shadow-sm transition-all hover:bg-surface-container-low has-[:checked]:border-primary has-[:checked]:bg-primary/[0.03]">
<input class="sr-only" name="role" type="radio" value="CLUB_ADMIN"/>
<span class="material-symbols-outlined text-primary mb-3 text-2xl">groups</span>
<span class="font-bold text-on-surface text-sm mb-1">Club Admin</span>
<span class="text-xs text-on-surface-variant leading-relaxed">Manage organization members and events.</span>
</label>
<label class="group relative flex flex-col p-5 bg-white rounded-xl cursor-pointer border-2 border-transparent shadow-sm transition-all hover:bg-surface-container-low has-[:checked]:border-primary has-[:checked]:bg-primary/[0.03]">
<input class="sr-only" name="role" type="radio" value="ADMIN"/>
<span class="material-symbols-outlined text-primary mb-3 text-2xl">admin_panel_settings</span>
<span class="font-bold text-on-surface text-sm mb-1">System Admin</span>
<span class="text-xs text-on-surface-variant leading-relaxed">Full control over institutional settings.</span>
</label>
</div>

<footer class="pt-10 flex flex-col sm:flex-row items-center justify-end gap-4 border-t border-outline-variant/20">
<button type="button" class="w-full sm:w-auto px-8 py-3 rounded-lg text-primary font-bold hover:bg-surface-container-high transition-colors text-center" onclick="window.location.href='admin-user.html'">Cancel</button>
<button type="submit" class="w-full sm:w-auto px-10 py-3 bg-primary text-on-primary rounded-lg font-bold shadow-lg shadow-primary/10 hover:bg-primary/90 transition-all active:scale-95">Create User</button>
</footer>
</form>

<script>
    document.getElementById('newUserForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        
        if(password !== confirmPassword) {
            alert('Passwords do not match');
            return;
        }

        // Password complexity validation
        const hasUpper = /[A-Z]/.test(password);
        const hasLower = /[a-z]/.test(password);
        const hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(password);

        if (password.length < 8 || !hasUpper || !hasLower || !hasSpecial) {
            alert("Password must be at least 8 characters long and contain at least one uppercase letter, one lowercase letter, and one special character.");
            return;
        }

        const role = document.querySelector('input[name="role"]:checked').value;
        const email = document.getElementById('email').value;

        // University email validation
        if (role === 'STUDENT' || role === 'CLUB_ADMIN') {
            if (!email.toLowerCase().endsWith('@my.sliit.lk')) {
                alert("Please use a university email (@my.sliit.lk) for Student and Club Admin roles.");
                return;
            }
        }

        const payload = {
            name: document.getElementById('fullName').value,
            email: email,
            universityId: document.getElementById('universityId').value,
            password: password,
            role: role,
            approvalStatus: 'APPROVED',
            active: true
        };

        try {
            const response = await fetch('/api/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert('User created successfully!');
                window.location.href = 'admin-user.html';
            } else {
                alert('Failed to create user. Please check credentials or try again.');
            }
        } catch (error) {
            console.error('Error creating user:', error);
            alert('Error creating user.');
        }
    });

    function logout() {
        localStorage.clear();
        sessionStorage.clear();
        window.location.href = 'landing-page.html';
    }
</script>
<script src="assets/js/transitions.js"></script>
