<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Uni Event Portal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="assets/css/transitions.css">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#21417f",
                        "on-primary": "#ffffff",
                        "on-surface": "#191c1d",
                        "surface-container": "#edeeef",
                        "surface-container-low": "#f3f4f5",
                        "surface-container-highest": "#e1e3e4",
                        "surface-container-lowest": "#ffffff"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .tab-active { border-bottom-color: #21417f; color: #21417f; }
    </style>
</head>
<body class="bg-surface-container-low font-body text-on-surface antialiased min-h-screen">
<header class="bg-white border-b border-slate-200 sticky-nav h-16 flex items-center shadow-sm">
    <div class="max-w-7xl mx-auto px-6 w-full flex justify-between items-center h-full">
        <div class="flex items-center gap-12 h-full">
            <div class="flex items-center gap-2 cursor-pointer h-full items-center flex" onclick="window.history.back()">
                <span class="material-symbols-outlined text-slate-400">arrow_back</span>
                <img src="assets/images/logo.png" alt="Scholar Hub" class="h-8 md:h-10">
            </div>
            <h1 class="font-headline font-bold text-lg hidden md:block">My Activities</h1>
        </div>
        <div class="flex items-center gap-4 h-full">
             <div class="flex items-center gap-3 pl-3 border-l border-slate-200 relative cursor-pointer group h-full" onclick="document.getElementById('profileDropdown').classList.toggle('hidden')">
                <div class="h-9 w-9 rounded-full overflow-hidden border border-slate-200 bg-slate-100 flex items-center justify-center">
                    <span class="material-symbols-outlined text-slate-500">person</span>
                </div>
                <span id="userName" class="text-sm font-semibold text-slate-700 hidden lg:block">User</span>
                <span class="material-symbols-outlined text-sm text-slate-400">expand_more</span>
                
                <div id="profileDropdown" class="hidden absolute top-full right-0 mt-4 w-48 bg-white rounded-xl shadow-lg border border-slate-200 py-2 z-50">
                    <a href="profile.html" class="flex items-center gap-2 px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 transition-colors">
                        <span class="material-symbols-outlined text-[18px]">person</span>
                        My Profile
                    </a>
                    <div class="h-[1px] bg-slate-100 my-1 mx-2"></div>
                    <a href="#" onclick="logout()" class="flex items-center gap-2 px-4 py-2 text-sm text-error hover:bg-error/5 transition-colors font-semibold">
                        <span class="material-symbols-outlined text-[18px]">logout</span>
                        Logout
                    </a>
                </div>
            </div>
        </div>
    </div>
</header>

<main class="max-w-7xl mx-auto px-6 py-12">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-10">
        <div>
            <h2 class="text-4xl font-extrabold font-headline text-slate-900 tracking-tight mb-2">My Journey</h2>
            <p class="text-slate-500">Track all your registrations and club memberships in one place.</p>
        </div>
        <div class="flex bg-white p-1 rounded-2xl shadow-sm border border-slate-200">
            <button onclick="switchTab('events')" id="tabEvents" class="px-6 py-2.5 rounded-xl text-sm font-bold transition-all bg-primary text-white">Registered Events</button>
            <button onclick="switchTab('clubs')" id="tabClubs" class="px-6 py-2.5 rounded-xl text-sm font-bold transition-all text-slate-500 hover:text-primary">Joined Clubs</button>
        </div>
    </div>

    <!-- Events Section -->
    <section id="eventsSection" class="animate-in fade-in slide-in-from-bottom-4 duration-500">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="eventsGrid">
            <!-- Data populated via JS -->
             <div class="col-span-full py-20 text-center">
                 <div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4">
                     <span class="material-symbols-outlined text-slate-400 text-3xl animate-spin">refresh</span>
                 </div>
                 <p class="text-slate-500">Loading your events...</p>
             </div>
        </div>
    </section>

    <!-- Clubs Section -->
    <section id="clubsSection" class="hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="clubsGrid">
            <!-- Data populated via JS -->
            <div class="col-span-full py-20 text-center">
                 <div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4">
                     <span class="material-symbols-outlined text-slate-400 text-3xl animate-spin">refresh</span>
                 </div>
                 <p class="text-slate-500">Loading your clubs...</p>
             </div>
        </div>
    </section>
</main>

<script>
    let user = null;
    let currentTab = 'events';

    document.addEventListener('DOMContentLoaded', () => {
        user = JSON.parse(localStorage.getItem('user'));
        if (!user) { window.location.href = 'login.html'; return; }

        document.getElementById('userName').textContent = user.name;
        if (user.avatarUrl) {
            const avatar = document.getElementById('userAvatar');
            avatar.src = user.avatarUrl;
            avatar.classList.remove('hidden');
            document.getElementById('userInitial').classList.add('hidden');
        }

        fetchMyEvents();
        fetchMyClubs();

        // Handle URL tab param
        const urlParams = new URLSearchParams(window.location.search);
        const tab = urlParams.get('tab');
        if (tab === 'clubs') {
            switchTab('clubs');
        } else if (tab === 'events') {
            switchTab('events');
        }

        document.addEventListener('click', (e) => {
            const dropdown = document.getElementById('profileDropdown');
            const profileBtn = dropdown.parentElement;
            if (dropdown && !profileBtn.contains(e.target)) {
                dropdown.classList.add('hidden');
            }
        });
    });

    function logout() {
        localStorage.clear();
        sessionStorage.clear();
        window.location.href = 'landing-page.html';
    }

    function switchTab(tab) {
        currentTab = tab;
        const btnEvents = document.getElementById('tabEvents');
        const btnClubs = document.getElementById('tabClubs');
        const secEvents = document.getElementById('eventsSection');
        const secClubs = document.getElementById('clubsSection');

        if (tab === 'events') {
            btnEvents.className = 'px-6 py-2.5 rounded-xl text-sm font-bold transition-all bg-primary text-white';
            btnClubs.className = 'px-6 py-2.5 rounded-xl text-sm font-bold transition-all text-slate-500 hover:text-primary';
            secEvents.classList.remove('hidden');
            secClubs.classList.add('hidden');
        } else {
            btnClubs.className = 'px-6 py-2.5 rounded-xl text-sm font-bold transition-all bg-primary text-white';
            btnEvents.className = 'px-6 py-2.5 rounded-xl text-sm font-bold transition-all text-slate-500 hover:text-primary';
            secClubs.classList.remove('hidden');
            secEvents.classList.add('hidden');
        }
    }

    async function fetchMyEvents() {
        try {
            const resp = await fetch(`/api/registrations/student/${user.id}?t=${Date.now()}`);
            const registrations = await resp.json();
            renderEvents(registrations);
        } catch (e) {
            console.error("Failed to load events", e);
            document.getElementById('eventsGrid').innerHTML = '<p class="text-center col-span-full text-red-500 font-bold">Failed to load registration data.</p>';
        }
    }

    async function fetchMyClubs() {
        try {
            const resp = await fetch(`/api/membership/student/${user.id}?t=${Date.now()}`);
            const memberships = await resp.json();
            renderClubs(memberships);
        } catch (e) {
            console.error("Failed to load clubs", e);
            document.getElementById('clubsGrid').innerHTML = '<p class="text-center col-span-full text-red-500 font-bold">Failed to load membership data.</p>';
        }
    }

    function renderEvents(registrations) {
        const grid = document.getElementById('eventsGrid');
        grid.innerHTML = '';
        
        const validRegs = registrations.filter(r => r.event);
        if (validRegs.length === 0) {
            grid.innerHTML = `
                <div class="col-span-full py-20 text-center bg-white rounded-[2rem] border border-slate-200">
                    <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4">
                        <span class="material-symbols-outlined text-slate-300 text-4xl">event_busy</span>
                    </div>
                    <h4 class="font-bold text-slate-900 mb-1">No registrations yet</h4>
                    <p class="text-slate-500 text-sm mb-6">Explore upcoming events and reserve your spot!</p>
                    <button onclick="window.location.href='student-event.html'" class="px-6 py-2.5 bg-primary text-white rounded-xl text-sm font-bold shadow-lg shadow-primary/20">Browse Events</button>
                </div>
            `;
            return;
        }

        validRegs.forEach(reg => {
            const ev = reg.event;
            const date = new Date(ev.startTime).toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' });
            const time = new Date(ev.startTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const statusClass = reg.status === 'CONFIRMED' ? 'bg-emerald-50 text-emerald-600' : 'bg-amber-50 text-amber-600';
            
            grid.innerHTML += `
                <div class="bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all border border-slate-100 group">
                    <div class="relative h-48">
                        <img src="${ev.posterUrl || 'https://images.unsplash.com/photo-1540575861501-7ad05823c94b?auto=format&fit=crop&w=2070'}" class="w-full h-full object-cover group-hover:scale-105 transition-all duration-500">
                        <div class="absolute top-4 left-4 ${statusClass} px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-wider shadow-sm backdrop-blur-md">
                            ${reg.status}
                        </div>
                    </div>
                    <div class="p-6">
                        <div class="flex items-center gap-2 mb-2">
                             <span class="px-2 py-0.5 bg-slate-100 text-slate-500 rounded text-[9px] font-bold uppercase">${ev.eventType || 'Event'}</span>
                        </div>
                        <h3 class="font-headline font-bold text-xl text-slate-900 mb-4 line-clamp-1">${ev.title}</h3>
                        <div class="space-y-2 mb-6">
                            <div class="flex items-center gap-2 text-slate-500 text-sm">
                                <span class="material-symbols-outlined text-lg">calendar_month</span>
                                <span>${date}</span>
                            </div>
                            <div class="flex items-center gap-2 text-slate-500 text-sm">
                                <span class="material-symbols-outlined text-lg">schedule</span>
                                <span>${time}</span>
                            </div>
                            <div class="flex items-center gap-2 text-slate-500 text-sm">
                                <span class="material-symbols-outlined text-lg">location_on</span>
                                <span>${ev.venue ? ev.venue.name : ev.location || 'Campus'}</span>
                            </div>
                        </div>
                        <button onclick="window.location.href='${ev.registrationRequired ? 'student-registerrequiredeventsdetails.html' : 'student-publiceventsdetails.html'}?id=${ev.id}'" class="w-full py-3 bg-slate-50 text-primary rounded-2xl text-sm font-bold hover:bg-primary hover:text-white transition-all">
                            View Details
                        </button>
                    </div>
                </div>
            `;
        });
    }

    function renderClubs(memberships) {
        const grid = document.getElementById('clubsGrid');
        grid.innerHTML = '';

        const validMemberships = memberships.filter(m => m.club);
        if (validMemberships.length === 0) {
            grid.innerHTML = `
                <div class="col-span-full py-20 text-center bg-white rounded-[2rem] border border-slate-200">
                    <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4">
                        <span class="material-symbols-outlined text-slate-300 text-4xl">diversity_3</span>
                    </div>
                    <h4 class="font-bold text-slate-900 mb-1">No clubs joined</h4>
                    <p class="text-slate-500 text-sm mb-6">Find your community and make an impact!</p>
                    <button onclick="window.location.href='student-clubs.html'" class="px-6 py-2.5 bg-primary text-white rounded-xl text-sm font-bold shadow-lg shadow-primary/20">Find Clubs</button>
                </div>
            `;
            return;
        }

        validMemberships.forEach(m => {
            const club = m.club;
            const date = new Date(m.joinDate).toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' });
            const statusClass = m.status === 'APPROVED' ? 'bg-secondary/10 text-secondary' : 'bg-amber-50 text-amber-600';
            const statusLabel = m.status === 'APPROVED' ? 'MEMBER' : 'PENDING';

            grid.innerHTML += `
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all border border-slate-100 flex flex-col items-center text-center group">
                    <div class="relative mb-6">
                        <div class="w-24 h-24 rounded-[2rem] bg-slate-50 flex items-center justify-center overflow-hidden border-4 border-white shadow-xl group-hover:rotate-3 transition-transform">
                            <img src="${club.logoUrl || 'https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=400'}" class="w-full h-full object-cover">
                        </div>
                        <div class="absolute -bottom-2 -right-2 ${statusClass} px-2.5 py-1 rounded-xl text-[8px] font-black uppercase tracking-widest shadow-sm">
                            ${statusLabel}
                        </div>
                    </div>
                    <h3 class="font-headline font-bold text-xl text-slate-900 mb-1">${club.name}</h3>
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-6">${club.category || 'Science & Tech'}</p>
                    
                    <div class="w-full p-4 bg-slate-50 rounded-2xl mb-8 flex items-center justify-between">
                         <div class="text-left">
                             <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Joined On</p>
                             <p class="text-xs font-bold text-slate-700">${date}</p>
                         </div>
                         <div class="h-6 w-px bg-slate-200"></div>
                         <div class="text-right">
                             <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Role</p>
                             <p class="text-xs font-bold text-slate-700">Member</p>
                         </div>
                    </div>
                    
                    <button onclick="window.location.href='student-viewclubdetails.html?id=${club.id}'" class="w-full py-4 rounded-2xl bg-primary text-white text-sm font-bold shadow-lg shadow-primary/20 active:scale-95 transition-all">
                        View Club Profile
                    </button>
                </div>
            `;
        });
    }
</script>
<script src="assets/js/transitions.js"></script>
</body>
</html>
