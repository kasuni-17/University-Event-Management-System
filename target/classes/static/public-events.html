<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Uni Event Portal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#21417f",
                        "on-primary": "#ffffff",
                        "on-surface": "#191c1d",
                        "surface-container": "#edeeef",
                        "surface-container-low": "#f3f4f5",
                        "surface-container-highest": "#e1e3e4",
                        "surface-container-lowest": "#ffffff"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .hero-gradient { background: linear-gradient(135deg, #21417f 0%, #3b5998 100%); }

        /* ── Auth Buttons ── */
        .btn-signin {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 20px;
            font-size: 13px;
            font-weight: 700;
            color: #21417f;
            background: transparent;
            border: 1.5px solid #21417f;
            border-radius: 10px;
            text-decoration: none;
            letter-spacing: 0.02em;
            transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease;
        }
        .btn-signin:hover {
            background: #21417f;
            color: #ffffff;
            box-shadow: 0 4px 14px rgba(33, 65, 127, 0.25);
            transform: translateY(-1px);
        }
        .btn-signin:active { transform: translateY(0); }

        .btn-signup {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 9px 22px;
            font-size: 13px;
            font-weight: 800;
            color: #ffffff;
            background: linear-gradient(135deg, #21417f 0%, #4B69FF 100%);
            border: none;
            border-radius: 10px;
            text-decoration: none;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            box-shadow: 0 4px 14px rgba(75, 105, 255, 0.30);
            transition: box-shadow 0.25s ease, transform 0.15s ease, filter 0.2s ease;
        }
        .btn-signup:hover {
            box-shadow: 0 6px 22px rgba(75, 105, 255, 0.50);
            filter: brightness(1.08);
            transform: translateY(-2px);
        }
        .btn-signup:active { transform: translateY(0); box-shadow: 0 2px 8px rgba(75,105,255,0.30); }
        .btn-signup .arrow-icon {
            font-size: 16px;
            transition: transform 0.2s ease;
        }
        .btn-signup:hover .arrow-icon { transform: translateX(3px) translateY(-1px); }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .auth-btn-group {
            animation: fadeSlideIn 0.5s ease 0.1s both;
        }
    </style>
</head>
<body class="bg-[#f8f9fa] font-body text-on-surface antialiased">
<div id="layout-root">
<header class="bg-white border-b border-slate-200 sticky-nav h-16 flex items-center">
    <div class="max-w-7xl mx-auto px-6 w-full flex justify-between items-center h-full">
        <div class="flex items-center gap-12 h-full">
            <a href="landing-page.html" class="flex items-center gap-2">
                <img src="assets/images/logo.png" alt="Scholar Hub" class="h-8 md:h-10">
            </a>
            <nav class="hidden md:flex items-center space-x-8 text-sm font-semibold h-full">
                <a class="nav-link text-slate-500 hover:text-primary transition-colors font-medium h-full flex items-center" href="landing-page.html">Home</a>
                <a class="nav-link text-slate-500 hover:text-primary transition-colors font-medium h-full flex items-center" href="public-events.html">Events</a>
                <a class="nav-link text-slate-500 hover:text-primary transition-colors font-medium h-full flex items-center" href="public-clubs.html">Clubs</a>
                <a class="nav-link text-slate-500 hover:text-primary transition-colors font-medium h-full flex items-center" href="about-us.html">About Us</a>
            </nav>
        </div>
        <div class="flex items-center gap-4 h-full">
            <div class="flex items-center gap-3 pl-4 border-l border-slate-200 auth-btn-group">
                <a href="login.html" class="btn-signin">
                    <span class="material-symbols-outlined" style="font-size:16px;">login</span>
                    Sign In
                </a>
                <a href="signup.html" class="btn-signup">
                    Sign Up
                    <span class="material-symbols-outlined arrow-icon">north_east</span>
                </a>
            </div>
        </div>
    </div>
</header>

<main class="page-transition-enter">
    <div class="max-w-7xl mx-auto px-6 py-12 w-full">
    <section class="mb-12 space-y-8 text-center sm:text-left">
        <div>
            <h1 class="font-headline font-extrabold text-4xl text-on-surface tracking-tight mb-2">Upcoming Campus Events</h1>
            <p class="text-slate-500 text-lg">Browse through all the exciting events happening at SLIIT.</p>
        </div>
        
        <div class="flex flex-col md:flex-row items-end gap-4 mb-8">
            <div class="relative group flex-1 w-full">
                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">search</span>
                <input id="searchInput" class="w-full pl-12 pr-4 py-3.5 bg-white border-none rounded-xl shadow-sm focus:ring-2 focus:ring-primary/20 text-base" placeholder="Search events..." type="text"/>
            </div>
            <div class="flex flex-col gap-2 w-full md:w-56">
                <label class="text-xs uppercase tracking-widest text-slate-500 font-bold ml-1">Categories</label>
                <select id="categoryFilter" class="w-full bg-white border-none shadow-sm rounded-lg px-4 py-3.5 text-sm font-medium focus:ring-2 focus:ring-primary/20 transition-all">
                    <option value="">All Categories</option>
                    <option value="Academic">Academic</option>
                    <option value="Tech">Technology</option>
                    <option value="Sports">Sports</option>
                    <option value="Culture">Art & Culture</option>
                    <option value="Social">Social</option>
                </select>
            </div>
        </div>
    </section>

    <section id="eventGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
        <!-- Data populated via JS -->
         <p class="col-span-full text-center text-slate-500 py-12">Loading upcoming events...</p>
    </section>
</main>

<script>
    let allEvents = [];

    document.addEventListener('DOMContentLoaded', () => {
        fetchEvents();
        document.getElementById('searchInput').addEventListener('input', filterEvents);
        document.getElementById('categoryFilter').addEventListener('change', filterEvents);
    });

    async function fetchEvents() {
        try {
            const resp = await fetch('/api/events/admin/upcoming?t=' + Date.now());
            allEvents = await resp.json();
            filterEvents();
        } catch (e) {
            console.error("Failed to load events", e);
            document.getElementById('eventGrid').innerHTML = '<p class="col-span-full text-center text-red-500">Unable to load events at this time.</p>';
        }
    }

    function renderEvents(events) {
        const grid = document.getElementById('eventGrid');
        grid.innerHTML = '';
        
        if (events.length === 0) {
            grid.innerHTML = '<p class="col-span-full text-center text-slate-500 py-12">No upcoming events found matching your criteria.</p>';
            return;
        }

        events.forEach(ev => {
            const date = new Date(ev.startTime).toLocaleDateString(undefined, {
                weekday: 'short', year: 'numeric', month: 'short', day: 'numeric'
            });
            const time = new Date(ev.startTime).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            const card = `
                <div class="group bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-all flex flex-col border border-slate-100">
                    <div class="relative h-56 overflow-hidden">
                        <img alt="${ev.title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" src="${ev.posterUrl || 'https://images.unsplash.com/photo-1540575861501-7ad05823c94b?auto=format&fit=crop&q=80&w=2070'}"/>
                        <div class="absolute top-4 left-4 flex gap-2">
                            <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider">${ev.eventType || 'Campus'}</span>
                            <span class="${ev.registrationRequired ? 'bg-amber-100 text-amber-700' : 'bg-emerald-100 text-emerald-700'} px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider">${ev.registrationRequired ? 'Registration Required' : 'Public Access'}</span>
                        </div>
                    </div>
                    <div class="p-6 flex-1 flex flex-col">
                        <h3 class="font-headline font-bold text-xl text-on-surface mb-3 line-clamp-1">${ev.title}</h3>
                        <div class="space-y-2 mb-6 text-slate-500">
                            <div class="flex items-center gap-2">
                                <span class="material-symbols-outlined text-lg">calendar_month</span>
                                <span class="text-sm font-medium">${date} at ${time}</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="material-symbols-outlined text-lg">location_on</span>
                                <span class="text-sm font-medium">${ev.venue ? ev.venue.name : ev.location || 'SLIIT Campus'}</span>
                            </div>
                        </div>
                        <div class="mt-auto">
                            <button onclick="window.location.href='student-publiceventsdetails.html?id=${ev.id}'" class="w-full hero-gradient text-white py-3 rounded-lg text-sm font-bold active:scale-95 transition-all flex items-center justify-center gap-2 shadow-sm">
                                View Details <span class="material-symbols-outlined text-sm">arrow_forward</span>
                            </button>
                        </div>
                    </div>
                </div>
            `;
            grid.innerHTML += card;
        });
    }

    function filterEvents() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const category = document.getElementById('categoryFilter').value;
        
        const filtered = allEvents.filter(ev => {
            const matchesSearch = ev.title.toLowerCase().includes(search) || (ev.description && ev.description.toLowerCase().includes(search));
            const matchesCategory = category === "" || ev.eventType === category;
            return matchesSearch && matchesCategory;
        });
        
        renderEvents(filtered);
    }
</script>
    </div>
</main>
</div>
<script src="assets/js/transitions.js"></script>
</body>
</html>
