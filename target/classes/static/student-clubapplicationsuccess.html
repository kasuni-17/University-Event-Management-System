<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Application Submitted | Scholar Hub</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#21417f",
              "primary-container": "#3b5998",
              "on-surface": "#191c1d",
              "on-surface-variant": "#444650",
              "surface-container-low": "#f3f4f5",
              "surface-container-high": "#e7e8e9",
              "surface-container-lowest": "#ffffff",
              "secondary-container": "#80f98b",
              "on-secondary-container": "#007327",
              "outline": "#747781",
              "outline-variant": "#c4c6d2"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; }
        .bg-gradient-primary { background: linear-gradient(135deg, #21417f 0%, #3b5998 100%); }
        .success-bg-blur { background: linear-gradient(135deg, rgba(33, 65, 127, 0.03) 0%, rgba(59, 89, 152, 0.05) 100%); }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex flex-col items-center justify-center p-6 success-bg-blur">
<main class="max-w-xl w-full">
    <!-- Success Card -->
    <div class="bg-surface-container-lowest rounded-2xl shadow-[0_12px_40px_rgba(25,28,29,0.06)] border border-outline-variant/10 overflow-hidden transform transition-all animate-in fade-in zoom-in duration-500">
        <!-- Decorative Texture Header -->
        <div class="h-32 bg-surface-container-low flex items-center justify-center relative overflow-hidden">
            <div class="absolute inset-0 opacity-10">
                <svg height="100%" width="100%" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <pattern height="40" id="grid" patternunits="userSpaceOnUse" width="40">
                            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="currentColor" stroke-width="1"></path>
                        </pattern>
                    </defs>
                    <rect fill="url(#grid)" height="100%" width="100%"></rect>
                </svg>
            </div>
            <!-- Success Icon -->
            <div class="relative z-10 bg-secondary-container text-on-secondary-container w-20 h-20 rounded-full flex items-center justify-center shadow-lg transform transition-transform animate-bounce duration-1000 delay-500">
                <span class="material-symbols-outlined !text-4xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
            </div>
        </div>

        <!-- Content Section -->
        <div class="p-10 text-center">
            <h1 class="font-headline text-3xl font-extrabold tracking-tight text-primary mb-4">Application Submitted!</h1>
            <div class="space-y-6">
                <p class="text-on-surface-variant font-body text-lg leading-relaxed max-w-sm mx-auto">
                    Your application for <span id="successClubName" class="font-bold text-on-surface underline decoration-blue-200 underline-offset-4 decoration-2">Robotics Society</span> has been sent for review. You will be notified once a decision is made.
                </p>
                <!-- Status Indicator -->
                <div class="inline-flex items-center gap-3 px-6 py-2.5 bg-surface-container-low rounded-full border border-outline-variant/20 shadow-sm">
                    <span class="w-3 h-3 rounded-full bg-amber-400 animate-pulse"></span>
                    <span class="font-headline text-[10px] font-bold uppercase tracking-widest text-outline">Application Status: Pending Review</span>
                </div>
                <div class="pt-10 flex flex-col sm:flex-row items-center justify-center gap-4">
                    <button onclick="window.location.href='student-clubs.html'" class="bg-gradient-primary text-white font-headline font-bold px-8 py-3.5 rounded-xl w-full sm:w-auto transition-transform active:scale-95 shadow-lg shadow-blue-500/10">
                        Back to Clubs
                    </button>
                    <button onclick="window.location.href='student-dashboard.html'" class="bg-surface-container-high hover:bg-surface-container-highest text-primary font-headline font-bold px-8 py-3.5 rounded-xl w-full sm:w-auto transition-colors active:scale-95">
                        Go to Dashboard
                    </button>
                </div>
            </div>
        </div>

        <!-- Details Footer -->
        <div class="bg-surface-container-lowest border-t border-outline-variant/15 px-10 py-6">
            <div class="flex flex-col sm:flex-row items-center justify-between gap-4 text-outline font-headline text-[10px] uppercase tracking-widest opacity-80">
                <div class="flex items-center gap-2">
                    <span class="material-symbols-outlined !text-sm">fingerprint</span>
                    Reference ID: <span id="refId">SH-2024-XXXX</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="material-symbols-outlined !text-sm">event_available</span>
                    Submitted: <span id="submitDate">Oct 24, 2024</span>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const clubName = urlParams.get('clubName') || "University Club";
        document.getElementById('successClubName').textContent = clubName;
        
        // Random Reference ID
        const rand = Math.floor(1000 + Math.random() * 9000);
        document.getElementById('refId').textContent = `SH-2024-${rand}`;

        // Today's Date
        const day = new Date();
        document.getElementById('submitDate').textContent = day.toLocaleDateString('default', { month: 'short', day: 'numeric', year: 'numeric' });
    });
</script>
</body>
</html>
